<!DOCTYPE html>
<html>
<head>
    <title>CPU Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>⚡ CPU Scheduling Simulator</h1>

    <div class="card">
        <h2>Add Process</h2>

        <input type="number" id="pid" placeholder="PID">
        <input type="number" id="arrival" placeholder="Arrival Time">
        <input type="number" id="burst" placeholder="Burst Time">

        <button onclick="addProcess()">Add</button>
    </div>

    <div class="card">
        <h2>Process List</h2>
        <table id="table">
            <tr>
                <th>PID</th>
                <th>Arrival</th>
                <th>Burst</th>
            </tr>
        </table>
    </div>

    <button class="run-btn" onclick="runSimulation()">Run Simulation</button>

    <div class="card">
        <h2>Results</h2>
        <pre id="output"></pre>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
